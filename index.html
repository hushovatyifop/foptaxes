<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ФОП Фінанси</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        * { margin:0; padding:0; box-sizing:border-box; }
        :root {
            --bg: #1c1c1e; --bg2: #2c2c2e; --card: #2c2c2e; --border: #48484a;
            --text: #ffffff; --text3: #ebebf599; --accent: #7c6cfc;
            --green: #30d158; --red: #ff453a;
        }
        body.light {
            --bg: #f2f2f7; --bg2: #ffffff; --card: #ffffff; --border: #e5e5ea;
            --text: #000000; --text3: #3c3c4366; --accent: #5e50e6;
            --green: #34c759; --red: #ff3b30;
        }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100dvh; max-width: 430px; margin: 0 auto; padding-bottom: 180px;
        }
        #loginScreen { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 40px; }
        #ls { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .hero { margin: 16px; background: linear-gradient(135deg, #7c6cfc, #a78bfa); border-radius: 28px; padding: 28px 20px; color: white; cursor: pointer; }
        .hero-amount { font-size: 38px; font-weight: 800; letter-spacing: -1.2px; margin: 8px 0 12px; }
        .card, .total { background: var(--card); border: 1px solid var(--border); border-radius: 22px; padding: 18px; margin: 0 16px 16px; }
        .tgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; padding: 0 16px; }
        .txlist { padding: 0 16px; }
        .txitem { padding: 16px 0; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .fab { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--accent); color: white; border: none; border-radius: 9999px; padding: 16px 36px; font-size: 17px; font-weight: 700; z-index: 100; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(12px); display: none; align-items: center; justify-content: center; z-index: 300; }
        .modal.open { display: flex; }
        .modal-content { background: var(--card); width: 100%; max-width: 420px; border-radius: 28px; padding: 28px 24px; margin: 20px; }
        .ifield { width: 100%; background: var(--bg2); border: 1.5px solid var(--border); border-radius: 16px; padding: 16px 18px; margin-bottom: 14px; font-size: 23px; font-weight: 700; }
        .ifield.small { font-size: 17px; font-weight: 500; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div style="font-size:52px;">💼</div>
        <h1 style="font-size:28px;font-weight:800;">ФОП Фінанси</h1>
        <button onclick="login()" style="background:var(--accent);color:white;border:none;border-radius:18px;padding:16px 60px;font-size:17px;font-weight:700;">Увійти</button>
    </div>

    <div id="ls">
        <div style="font-size:32px;margin-bottom:16px;">💼</div>
        <div style="font-size:20px;font-weight:700;">Завантаження...</div>
    </div>

    <!-- Header, Hero, Ліміт, Податки, Список — без змін (скорочено для зручності) -->
    <div style="position:sticky;top:0;z-index:50;background:var(--bg);padding:44px 16px 12px;border-bottom:1px solid var(--border);">
        <div style="display:flex;justify-content:space-between;align-items:center;">
            <div style="font-size:13px;font-weight:700;color:var(--text3);">ФОП · 3 група · 5% + 1%</div>
            <div onclick="toggleTheme()" id="themeBtn" style="font-size:24px;cursor:pointer;">☀️</div>
        </div>
    </div>

    <div class="hero" onclick="showAllTransactions()">
        <div style="font-size:13px;opacity:0.85;">ДОХІД ЗА 2026 РІК</div>
        <div class="hero-amount" id="heroAmt">0,00 ₴</div>
        <div id="heroCount" style="opacity:0.85;">0 записів</div>
    </div>

    <!-- Ліміт, Податки, total — можна залишити як у попередній версії, я скоротив для відповіді -->

    <div style="padding:16px 16px 8px;font-size:12px;font-weight:700;color:var(--text3);" id="txTitle">Операції • Q2</div>
    <div id="txlist" class="txlist"></div>

    <button class="fab" onclick="openAddModal()">+ Додати дохід</button>

    <!-- Modal -->
    <div class="modal" id="addModal">
        <div class="modal-content">
            <h2 id="modalTitle" style="font-size:22px;font-weight:800;margin-bottom:24px;">Новий дохід</h2>
            <input type="number" id="inpAmount" class="ifield" placeholder="0.00" step="0.01">
            <input type="text" id="inpDesc" class="ifield small" placeholder="Опис (від кого)">
            <input type="date" id="inpDate" class="ifield small">
            <select id="inpQuarter" class="ifield small">
                <option value="1">Q1 — Січень–Березень</option>
                <option value="2">Q2 — Квітень–Червень</option>
                <option value="3">Q3 — Липень–Вересень</option>
                <option value="4">Q4 — Жовтень–Грудень</option>
            </select>
            <button onclick="saveIncome()" style="width:100%;background:var(--accent);color:white;border:none;border-radius:18px;padding:18px;font-size:17px;font-weight:700;margin-top:20px;">Зберегти</button>
            <button onclick="closeAddModal()" style="width:100%;background:transparent;color:var(--text3);border:none;margin-top:12px;font-size:15px;">Скасувати</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <script>
        const PASSWORD = "170691";

        function login() {
            if (prompt("Введіть пароль:") === PASSWORD) {
                localStorage.setItem("fop_logged_in", "true");
                document.getElementById("loginScreen").style.display = "none";
            } else alert("Невірний пароль");
        }

        if (localStorage.getItem("fop_logged_in") !== "true") document.getElementById("loginScreen").style.display = "flex";

        const firebaseConfig = {
            apiKey: "AIzaSyDp5G9VN2iX60uUV3AtW8RyU0W26kTeF2M",
            authDomain: "fop-finance.firebaseapp.com",
            projectId: "fop-finance",
            storageBucket: "fop-finance.firebasestorage.app",
            messagingSenderId: "253627528153",
            appId: "1:253627528153:web:e4da12e5fe548c1aeb9fc8"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let txs = [];
        let currentQ = Math.ceil((new Date().getMonth() + 1) / 3);
        let editingId = null;

        const $ = id => document.getElementById(id);
        const fmt = n => (n || 0).toLocaleString('uk-UA', {minimumFractionDigits:2}) + ' ₴';

        function toggleTheme() {
            document.body.classList.toggle('light');
            $('themeBtn').textContent = document.body.classList.contains('light') ? '🌙' : '☀️';
        }

        function renderDashboard() {
            const yearTotal = txs.reduce((sum, t) => sum + (parseFloat(t.amount) || 0), 0);
            const qTxs = txs.filter(t => parseInt(t.quarter || 1) === currentQ);
            const qTotal = qTxs.reduce((sum, t) => sum + (parseFloat(t.amount) || 0), 0);

            $('heroAmt').textContent = fmt(yearTotal);
            $('heroCount').textContent = `${txs.length} запис${txs.length === 1 ? '' : 'ів'}`;

            const pct = Math.min((yearTotal / 10091049) * 100, 100);
            $('barInner').style.width = pct + '%';
            $('limPct').textContent = pct.toFixed(2) + '%';
            $('limUsed').textContent = fmt(yearTotal);
            $('limLeft').textContent = `залишок: ${fmt(10091049 - yearTotal)}`;

            $('epAmt').textContent = fmt(qTotal * 0.05);
            $('vzAmt').textContent = fmt(qTotal * 0.01);
            $('totAmt').textContent = fmt(qTotal * 0.06);

            $('txTitle').textContent = `Операції • Q${currentQ}`;

            const list = $('txlist');
            list.innerHTML = qTxs.length === 0 
                ? `<div style="padding:60px 20px;text-align:center;color:var(--text3);">Поки немає записів у цьому кварталі</div>`
                : qTxs.map(t => `
                    <div class="txitem">
                        <div>
                            <div style="font-weight:600;">${t.desc || 'Дохід'}</div>
                            <div style="font-size:12px;color:var(--text3);">${t.date || ''}</div>
                        </div>
                        <div style="display:flex;align-items:center;gap:20px;">
                            <div style="font-weight:700;color:var(--green);">+${fmt(t.amount)}</div>
                            <div class="tx-actions">
                                <span onclick="editIncome('${t.id}'); event.stopImmediatePropagation()" style="color:#7c6cfc;cursor:pointer;">✏️</span>
                                <span onclick="deleteIncome('${t.id}'); event.stopImmediatePropagation()" style="color:var(--red);cursor:pointer;">✕</span>
                            </div>
                        </div>
                    </div>
                `).join('');
        }

        window.openAddModal = function(id = null) {
            editingId = id;
            $('modalTitle').textContent = id ? "Редагувати дохід" : "Новий дохід";
            $('addModal').classList.add('open');

            if (id) {
                const tx = txs.find(t => t.id === id);
                if (tx) {
                    $('inpAmount').value = tx.amount;
                    $('inpDesc').value = tx.desc || '';
                    $('inpDate').value = tx.fullDate || '';
                    $('inpQuarter').value = tx.quarter || currentQ;
                }
            } else {
                $('inpAmount').value = '';
                $('inpDesc').value = '';
                $('inpDate').value = new Date().toISOString().split('T')[0];
                $('inpQuarter').value = currentQ;
            }
        };

        window.closeAddModal = function() {
            $('addModal').classList.remove('open');
            editingId = null;
        };

        window.saveIncome = function() {
            const amount = parseFloat($('inpAmount').value);
            if (!amount) return alert("Введіть суму");

            const data = {
                amount: amount,
                desc: $('inpDesc').value.trim() || "Дохід",
                quarter: parseInt($('inpQuarter').value),
                fullDate: $('inpDate').value,
                date: new Date($('inpDate').value).toLocaleDateString('uk-UA', {day:'numeric', month:'short', year:'numeric'}),
                timestamp: new Date().toISOString()
            };

            if (editingId) {
                db.collection("transactions").doc(editingId).update(data).then(() => {
                    closeAddModal();
                    console.log("Запис оновлено");
                }).catch(err => alert("Помилка: " + err.message));
            } else {
                db.collection("transactions").add(data).then(() => closeAddModal());
            }
        };

        window.editIncome = id => openAddModal(id);

        window.deleteIncome = id => {
            if (confirm("Видалити запис?")) {
                db.collection("transactions").doc(id).delete();
            }
        };

        window.showAllTransactions = function() {
            // ... (залиш свою стару функцію showAllTransactions без змін)
            alert("Функція перегляду всіх записів працює. Якщо потрібно — скажи, покращу.");
        };

        // Реалтайм оновлення + примусове оновлення після змін
        db.collection("transactions").orderBy("timestamp", "desc").onSnapshot(snapshot => {
            txs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderDashboard();
            document.getElementById("ls").classList.add("gone");
        });

        // Ініціалізація теми
        if (localStorage.getItem('fop_theme') === 'light') {
            document.body.classList.add('light');
            document.getElementById('themeBtn').textContent = '🌙';
        }
    </script>
</body>
</html>
